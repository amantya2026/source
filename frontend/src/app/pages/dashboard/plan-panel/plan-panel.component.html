<aside class="plan-panel">
  <h2 class="plan-panel__title">Plan</h2>

  <form [formGroup]="planForm" class="plan-form">
    <div class="plan-field">
      <label for="plane-name">Plane name</label>
      <input
        pInputText
        id="plane-name"
        formControlName="planeName"
        placeholder="Enter plane name"
      />
    </div>

    <div class="plan-field">
      <label for="plane-speed">Speed (km/h)</label>
      <input
        pInputText
        id="plane-speed"
        inputmode="numeric"
        pattern="[0-9]*"
        formControlName="speed"
        (input)="onSpeedInput($event)"
        placeholder="Numbers only"
      />
    </div>

    <div class="plan-field">
      <label for="starting-date">Starting date &amp; time</label>
      <p-datepicker
        inputId="starting-date"
        formControlName="startingDate"
        dateFormat="dd/mm/yy HH:mm"
        [showTime]="true"
        hourFormat="24"
        [showIcon]="true"
        [iconDisplay]="'input'"
        placeholder="Select date & time"
      />
    </div>

    <div class="plan-field">
      <label>Map route</label>
      <p-button
        type="button"
        label="Map route"
        icon="pi pi-map-marker"
        size="small"
        [outlined]="!routeSelectionActive"
        [styleClass]="routeSelectionActive ? 'plan-map-route-active' : ''"
        (onClick)="mapRouteClick.emit()"
      />
      @if (routeSelectionActive) {
        <p class="plan-hint">Click on the map to add waypoints. Added: {{ draftWaypointCount }}</p>
      }
    </div>

    @if (plansCount >= maxPlans) {
      <p class="plan-limit">Maximum {{ maxPlans }} plans saved.</p>
    } @else if (savedPlanKeys.length) {
      <p class="plan-saved">Saved: {{ savedPlanKeys.join(', ') }} ({{ plansCount }}/{{ maxPlans }})</p>
    }

    <p-button
      type="button"
      label="Finish"
      icon="pi pi-check"
      size="small"
      styleClass="plan-finish-btn"
      [disabled]="finishDisabled"
      (onClick)="finishClick.emit()"
    />

    <p-button
      type="button"
      label="Clear all routes"
      icon="pi pi-trash"
      size="small"
      severity="danger"
      [outlined]="true"
      styleClass="plan-clear-btn"
      [disabled]="clearAllDisabled"
      (onClick)="clearAllRoutesClick.emit()"
    />
  </form>
</aside>
